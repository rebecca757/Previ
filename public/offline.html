<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prevì — Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f5f7f6;
        color: #1a2420;
      }
      .card {
        max-width: 26rem;
        text-align: center;
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 1.25rem;
        border-radius: 16px;
        background: #0f6e56;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 1.75rem;
        font-weight: 700;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1.5rem;
        font-size: 0.95rem;
        line-height: 1.5;
        color: #51605a;
      }
      button {
        appearance: none;
        border: none;
        cursor: pointer;
        background: #0f6e56;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        padding: 0.65rem 1.4rem;
        border-radius: 10px;
      }
      button:hover {
        background: #0d5e49;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">P</div>
      <h1>Sei offline</h1>
      <p>
        Non riesci a connetterti a Prevì in questo momento. Controlla la tua
        connessione a internet e riprova.
      </p>
      <button onclick="location.reload()">Riprova</button>
    </div>
  </body>
</html>
